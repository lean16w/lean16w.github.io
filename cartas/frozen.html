<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Surpresa pra você ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c0496e;
    --rose-light: #f7d6e0;
    --rose-dark: #7a1f3d;
    --cream: #fdf6f0;
    --text: #2a1a1f;
    --muted: #9a7a84;
    --petal1: #f7c5d0;
    --petal2: #f9dde4;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ---- Floating petals bg ---- */
  .petals {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .petal {
    position: absolute;
    width: 12px; height: 18px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ---- Screens ---- */
  .screen {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .screen.hidden { display: none; }

  /* ---- Lock screen ---- */
  .envelope {
    width: 80px; height: 60px;
    margin: 0 auto 2rem;
    position: relative;
  }
  .envelope svg { width: 100%; height: 100%; }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(13px, 3.5vw, 16px);
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 0.6rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 7vw, 42px);
    font-weight: 700;
    color: var(--rose-dark);
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .desc {
    font-size: clamp(14px, 3.8vw, 16px);
    color: var(--muted);
    line-height: 1.7;
    max-width: 320px;
    margin-bottom: 1.8rem;
  }

  .hint-box {
    background: var(--rose-light);
    border: 1px solid #e8b4c2;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--rose-dark);
    margin-bottom: 2rem;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hint-box span.icon { font-size: 16px; }

  .input-area {
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }

  .dots-row {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 4px;
  }
  .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #d4a0b0;
    background: transparent;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .dot.filled { background: var(--rose); border-color: var(--rose); transform: scale(1.15); }
  .dot.wrong  { background: #e03060; border-color: #e03060; animation: shake 0.3s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 10px;
    justify-content: center;
  }
  .key {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 1.5px solid #e0c0ca;
    background: white;
    font-size: 22px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, transform 0.1s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .key:active, .key.pressed {
    background: var(--rose-light);
    border-color: var(--rose);
    transform: scale(0.92);
  }
  .key.del {
    font-size: 18px;
    color: var(--muted);
  }
  .key.empty { border: none; background: transparent; cursor: default; }

  .err-msg {
    font-size: 13px;
    color: #c0304a;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  /* ---- Reveal screen ---- */
  #reveal {
    background: linear-gradient(160deg, #fff5f8 0%, #fce8ef 100%);
  }

  .confetti-burst {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    opacity: 0;
    animation: confetti-fall 1.8s ease-in forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  .reveal-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    animation: pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .big-heart {
    font-size: 64px;
    line-height: 1;
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%     { transform: scale(1.18); }
    28%     { transform: scale(1); }
    42%     { transform: scale(1.12); }
    56%     { transform: scale(1); }
  }

  .reveal-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 700;
    color: var(--rose-dark);
    line-height: 1.2;
  }

  .reveal-msg {
    font-size: clamp(14px, 4vw, 17px);
    color: var(--muted);
    line-height: 1.7;
    max-width: 300px;
  }

  .link-btn {
    display: inline-flex;
    align-items: center; gap: 10px;
    background: var(--rose);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 16px 32px;
    border-radius: 50px;
    text-decoration: none;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(192,73,110,0.35);
    -webkit-tap-highlight-color: transparent;
  }
  .link-btn:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(192,73,110,0.25); }
  .link-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  .footer-love {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #c48a9a;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<!-- Falling petals -->
<div class="petals" id="petals"></div>

<!-- LOCK SCREEN -->
<div class="screen" id="lock">

  <div class="envelope">
    <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="76" height="56" rx="6" fill="#fff" stroke="#e8b4c2" stroke-width="2"/>
      <path d="M2 8 L40 36 L78 8" stroke="#e8b4c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M2 56 L28 32" stroke="#e8b4c2" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M78 56 L52 32" stroke="#e8b4c2" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M32 30 Q40 14 48 30" fill="#f7c5d0" stroke="#d4839a" stroke-width="1"/>
    </svg>
  </div>

  <p class="tagline">apenas vc vai saber...</p>
  <h1>Tem uma surpresa<br>esperando por vc</h1>
  <p class="desc">Digite a senha certa para desbloquear algo muito especial q preparei pra vc</p>

  <div class="hint-box">
    <span class="icon">💡</span>
    Dica: a junção dos nossos aniversários
  </div>

  <div class="input-area">
    <div class="dots-row" id="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="err-msg" id="err"></div>

    <div class="numpad" id="numpad">
      <button class="key" data-n="1">1</button>
      <button class="key" data-n="2">2</button>
      <button class="key" data-n="3">3</button>
      <button class="key" data-n="4">4</button>
      <button class="key" data-n="5">5</button>
      <button class="key" data-n="6">6</button>
      <button class="key" data-n="7">7</button>
      <button class="key" data-n="8">8</button>
      <button class="key" data-n="9">9</button>
      <button class="key empty"></button>
      <button class="key" data-n="0">0</button>
      <button class="key del" id="del">⌫</button>
    </div>
  </div>
</div>

<!-- REVEAL SCREEN -->
<div class="screen hidden" id="reveal">
  <div class="confetti-burst" id="confetti"></div>
  <div class="reveal-content">
    <div class="big-heart">♥</div>
    <div class="reveal-title">vc descobriu!</div>
    <p class="reveal-msg">Achou rsrs, preparei algo bem especial só pra vc...</p>
    <a class="link-btn" href="https://drive.google.com/drive/folders/1pAqMjft-uyxDTMTeSB6cJE5YAxUIwpBH" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      Abrir Link
    </a>
    <p class="footer-love">e não esqueça q eu te amo demais ♡</p>
  </div>
</div>

<script>
  const PASSWORD = '2722';
  let input = '';

  // --- Petals ---
  const petalColors = ['#f7c5d0','#f9dde4','#fbb8c8','#fce0e8','#f4aac0'];
  const petalsEl = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = petalColors[Math.floor(Math.random() * petalColors.length)];
    p.style.width = (8 + Math.random() * 10) + 'px';
    p.style.height = (12 + Math.random() * 14) + 'px';
    p.style.animationDuration = (5 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.animationIterationCount = 'infinite';
    petalsEl.appendChild(p);
  }

  // --- Numpad ---
  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < input.length);
    }
  }

  function shake() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('d' + i);
      d.classList.remove('filled');
      d.classList.add('wrong');
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.remove('wrong');
      }
    }, 500);
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    setTimeout(() => el.textContent = '', 2000);
  }

  function tryPassword() {
    if (input === PASSWORD) {
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('reveal').classList.remove('hidden');
      spawnConfetti();
    } else {
      shake();
      showErr('Senha errada... pensa mais um pouquinho!');
      input = '';
      updateDots();
    }
  }

  document.getElementById('numpad').addEventListener('click', e => {
    const btn = e.target.closest('.key');
    if (!btn) return;
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 150);

    if (btn.id === 'del') {
      input = input.slice(0, -1);
      updateDots();
      return;
    }
    const n = btn.dataset.n;
    if (n === undefined || input.length >= 4) return;
    input += n;
    updateDots();
    if (input.length === 4) setTimeout(tryPassword, 200);
  });

  // keyboard support
  document.addEventListener('keydown', e => {
    if (document.getElementById('lock').classList.contains('hidden')) return;
    if (e.key >= '0' && e.key <= '9' && input.length < 4) {
      input += e.key;
      updateDots();
      if (input.length === 4) setTimeout(tryPassword, 200);
    } else if (e.key === 'Backspace') {
      input = input.slice(0, -1);
      updateDots();
    }
  });

  // --- Confetti ---
  function spawnConfetti() {
    const colors = ['#f7c5d0','#c0496e','#f9a8c0','#7a1f3d','#fbe0e8','#ff8fab','#fff'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = 6 + Math.random() * 10;
      c.style.width = size + 'px';
      c.style.height = size + 'px';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDelay = (Math.random() * 0.8) + 's';
      c.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
      container.appendChild(c);
    }
  }
</script>
</body>
</html>
